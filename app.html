<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── App Shell ── */
    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .app-logo { font-size: 22px; font-weight: 700; color: var(--primary); display:flex; align-items:center; gap:8px; }
    .app-logo span { font-size: 20px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-chip {
      font-size: 13px; font-weight: 500; color: var(--text-muted);
      background: var(--surface2); padding: 5px 12px; border-radius: 99px;
    }

    /* ── Week bar ── */
    .week-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .week-nav { display: flex; align-items: center; gap: 8px; }
    .week-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .week-tag {
      font-size: 12px; background: var(--primary-light); color: var(--primary);
      padding: 3px 10px; border-radius: 99px; font-weight: 600;
    }
    .view-toggle {
      display: flex; background: var(--bg); border-radius: var(--radius); padding: 3px; gap: 3px;
    }
    .view-btn {
      padding: 6px 14px; border: none; background: transparent; border-radius: calc(var(--radius) - 2px);
      font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all .18s;
    }
    .view-btn.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-sm); }

    /* ── Main ── */
    .app-main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* ── VISÃO SEMANAL ── */
    .week-grid {
      display: grid;
      grid-template-columns: 180px repeat(7, 1fr);
      gap: 0;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .week-grid-header {
      background: var(--primary);
      color: #fff;
      padding: 10px 12px;
      font-size: 13px; font-weight: 600; text-align: center;
    }
    .week-grid-header.cat-col { text-align: left; }
    .week-grid-header.today { background: var(--accent); }

    .cat-header-row {
      grid-column: 1 / -1;
      padding: 8px 14px;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .cat-header-row .cat-count {
      font-size: 11px; font-weight: 600; opacity: .75;
      background: rgba(255,255,255,.25); padding: 1px 7px; border-radius: 99px;
    }

    .week-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-collapse: collapse;
      padding: 6px 8px;
      min-height: 56px;
      vertical-align: top;
    }
    .week-cell.cat-label {
      background: var(--surface2);
      font-size: 12px; color: var(--text-muted); font-weight: 500;
      display: flex; align-items: center; padding: 8px 12px;
    }

    .task-chip {
      background: var(--surface2);
      border-left: 3px solid var(--primary);
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 5px;
      display: flex; align-items: flex-start; gap: 6px;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s;
      font-size: 13px;
    }
    .task-chip:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .task-chip.done { opacity: .55; }
    .task-chip.done .task-title { text-decoration: line-through; }
    .task-chip.unscheduled { border-left-color: var(--text-muted); border-style: dashed; }
    .task-title { flex: 1; color: var(--text); line-height: 1.35; word-break: break-word; }
    .task-check { flex-shrink: 0; margin-top: 1px; }

    .add-task-inline {
      margin-top: 4px; width: 100%;
      display: flex; align-items: center; gap: 4px;
      opacity: 0; transition: opacity .15s;
    }
    .week-cell:hover .add-task-inline { opacity: 1; }
    .add-task-inline button {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 2px; border-radius: 50%;
      transition: color .15s, background .15s;
    }
    .add-task-inline button:hover { color: var(--primary); background: var(--primary-light); }

    /* Coluna sem dia */
    .unscheduled-col {
      margin-top: 24px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .unscheduled-col-header {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 14px; font-weight: 600; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }
    .unscheduled-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    /* ── VISÃO LISTA ── */
    .list-view { display: flex; flex-direction: column; gap: 16px; }
    .list-cat-block {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .list-cat-header {
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .list-cat-name { font-size: 15px; font-weight: 700; }
    .list-cat-sub { font-size: 12px; opacity: .7; margin-top: 2px; }
    .list-tasks { padding: 0 0 8px; }
    .list-task-row {
      padding: 10px 18px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      transition: background .12s; cursor: pointer;
    }
    .list-task-row:last-child { border-bottom: none; }
    .list-task-row:hover { background: var(--bg); }
    .list-task-row.done .list-task-title { text-decoration: line-through; opacity: .5; }
    .list-task-title { flex: 1; font-size: 14px; }
    .list-task-day {
      font-size: 12px; font-weight: 600;
      color: var(--primary); background: var(--primary-light);
      padding: 2px 8px; border-radius: 99px;
    }
    .list-task-day.no-day { color: var(--text-muted); background: var(--surface2); }

    .list-task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
    .list-task-row:hover .list-task-actions { opacity: 1; }
    .list-task-actions button {
      background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px;
      font-size: 14px; transition: background .12s;
    }
    .list-task-actions button:hover { background: var(--surface2); }

    /* ── Loading ── */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 64px; color: var(--text-muted); gap: 12px; flex-direction: column;
    }
    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Settings Panel ── */
    .settings-section { margin-bottom: 28px; }
    .settings-section h4 {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }

    .theme-picker { display: flex; flex-wrap: wrap; gap: 10px; }
    .theme-swatch {
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
      border: 3px solid transparent; transition: all .18s; position: relative;
    }
    .theme-swatch.active { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .theme-swatch[title]::after {
      content: attr(title);
      position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: var(--text-muted); white-space: nowrap;
    }

    .color-grid { display: flex; gap: 8px; align-items: center; }
    .color-preview { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; }

    .cat-list { display: flex; flex-direction: column; gap: 8px; }
    .cat-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); padding: 8px 12px; border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .cat-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
    .cat-item-name { flex: 1; font-size: 14px; font-weight: 500; }
    .cat-item-actions { display: flex; gap: 4px; }

    /* Responsive */
    @media (max-width: 768px) {
      .week-grid { grid-template-columns: 120px repeat(7, minmax(100px, 1fr)); overflow-x: auto; display: block; }
      .week-grid { display: -webkit-box; overflow-x: scroll; }
      .app-main { padding: 12px; }
      .week-bar { padding: 8px 12px; }
    }
  </style>
</head>
<body class="theme-cotton-candy">

<!-- ── Header ── -->
<header class="app-header">
  <div class="app-logo"><span>🗓️</span> Agenda</div>
  <div class="header-right">
    <div class="user-chip" id="user-display"></div>
    <button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙️ Config</button>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
  </div>
</header>

<!-- ── Week bar ── -->
<div class="week-bar">
  <div class="week-nav">
    <button class="btn btn-ghost btn-sm" onclick="navWeek(-1)">‹</button>
    <div>
      <span class="week-label" id="week-label">Carregando…</span>
      <span class="week-tag" id="week-tag">semana atual</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="navWeek(1)">›</button>
    <button class="btn btn-ghost btn-sm" id="today-btn" onclick="goToCurrentWeek()" style="display:none">Ir para semana atual</button>
    <div class="week-progress" id="week-progress" style="margin-left:8px;">
      <div class="week-progress-bar"><div class="week-progress-fill" id="week-progress-fill" style="width:0%"></div></div>
      <span id="week-progress-label">0/0</span>
    </div>
  </div>
  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Buscar tarefa…" oninput="onSearchInput()"/>
      <button class="search-clear" id="search-clear" style="display:none" onclick="clearSearch()">✕</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-view-week" onclick="setView('week')">📅 Semanal</button>
      <button class="view-btn" id="btn-view-list" onclick="setView('list')">☰ Lista</button>
    </div>
    <div class="view-toggle" id="list-group-toggle" style="display:none">
      <button class="view-btn active" id="btn-group-cat" onclick="setListGroup('categoria')">Por categoria</button>
      <button class="view-btn" id="btn-group-day" onclick="setListGroup('dia')">Por dia</button>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddTask()">+ Tarefa</button>
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()" title="Exportar CSV">⬇️</button>
    <button class="btn btn-ghost btn-sm" onclick="sendEmail()" title="Enviar e-mail de resumo">📧</button>
  </div>
</div>

<!-- ── Main content ── -->
<main class="app-main" id="main-content">
  <div class="loading-state"><div class="spinner"></div><span>Carregando…</span></div>
</main>

<!-- ── Modal: Adicionar/Editar Tarefa ── -->
<div class="modal-backdrop" id="modal-task" style="display:none" onclick="closeTaskModal(event)">
  <div class="modal" style="max-width:520px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-task-title">Nova Tarefa</h3>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>Categoria</label>
        <select id="task-cat"></select>
      </div>
      <div class="form-field">
        <label>Título</label>
        <input type="text" id="task-title" placeholder="O que precisa ser feito?"/>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
        <div class="form-field">
          <label>Dia da semana</label>
          <select id="task-day"></select>
        </div>
        <div class="form-field">
          <label>Prioridade</label>
          <select id="task-priority">
            <option value="">Nenhuma</option>
            <option value="baixa">🔵 Baixa</option>
            <option value="media">🟠 Média</option>
            <option value="alta">🔴 Alta</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label class="check-wrap" style="cursor:pointer">
          <input type="checkbox" id="task-destaque"/>
          <div class="check-box"></div>
          <span style="font-size:13px;font-weight:600">⭐ Destacar esta tarefa</span>
        </label>
      </div>

      <div class="form-field">
        <label>Detalhes <span style="color:var(--text-muted);font-weight:400">(opcional)</span></label>
        <textarea id="task-detail" rows="2" placeholder="Informações adicionais…"></textarea>
      </div>

      <div class="form-field" id="field-week-choice">
        <label>Semana</label>
        <select id="task-week">
          <option value="current">Semana atual</option>
          <option value="next">Próxima semana</option>
        </select>
      </div>

      <div class="form-field">
        <label class="check-wrap" style="cursor:pointer" onclick="toggleRecurrenceFields()">
          <input type="checkbox" id="task-recurrent-toggle"/>
          <div class="check-box"></div>
          <span style="font-size:13px;font-weight:600">🔁 Tarefa recorrente</span>
        </label>
        <div id="recurrence-fields" style="display:none; margin-top:10px; padding:12px; background:var(--bg); border-radius:var(--radius);">
          <label style="font-size:12px; font-weight:600; display:block; margin-bottom:8px;">Repetir em quais dias:</label>
          <div id="recurrence-days" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;"></div>
          <label style="font-size:12px; font-weight:600; display:block; margin-bottom:6px;">Repetir até <span style="font-weight:400;color:var(--text-muted)">(deixe em branco para indefinidamente)</span></label>
          <input type="date" id="recurrence-end" style="width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit;"/>
          <p style="font-size:11px; color:var(--text-muted); margin-top:8px;">A próxima ocorrência só é criada depois que você marcar a atual como concluída.</p>
        </div>
      </div>

      <div class="form-field">
        <label>Depende de <span style="color:var(--text-muted);font-weight:400">(opcional — só tarefas desta semana)</span></label>
        <select id="task-depends">
          <option value="">Nenhuma dependência</option>
        </select>
      </div>

      <div class="form-field" id="field-subtasks" style="display:none">
        <label>Subtarefas</label>
        <div id="subtask-list-modal" style="display:flex; flex-direction:column; gap:6px; margin-bottom:8px;"></div>
        <div style="display:flex; gap:6px;">
          <input type="text" id="new-subtask-input" placeholder="Nova subtarefa…" style="flex:1; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:13px;" onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtaskToModal();}"/>
          <button class="btn btn-ghost btn-sm" onclick="addSubtaskToModal()">+ Add</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeTaskModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-task" onclick="saveTask()">Salvar tarefa</button>
    </div>
  </div>
</div>

<!-- ── Modal: Configurações ── -->
<div class="modal-backdrop" id="modal-settings" style="display:none" onclick="closeSettings(event)">
  <div class="modal" style="max-width:560px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>⚙️ Configurações</h3>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">

      <div class="settings-section">
        <h4>Idioma</h4>
        <div class="form-field" style="margin:0">
          <select id="cfg-lang">
            <option value="pt-BR">🇧🇷 Português (BR)</option>
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h4>E-mail semanal</h4>
        <div class="form-field">
          <label>Endereço de e-mail</label>
          <input type="email" id="cfg-email" placeholder="seu@email.com"/>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
          <div class="form-field" style="margin:0">
            <label>Dia de envio</label>
            <select id="cfg-send-day">
              <option value="Monday">Segunda-feira</option>
              <option value="Tuesday">Terça-feira</option>
              <option value="Wednesday">Quarta-feira</option>
              <option value="Thursday">Quinta-feira</option>
              <option value="Friday">Sexta-feira</option>
              <option value="Saturday">Sábado</option>
              <option value="Sunday">Domingo</option>
            </select>
          </div>
          <div class="form-field" style="margin:0">
            <label>Horário (0–23h)</label>
            <input type="number" id="cfg-send-hour" min="0" max="23" value="8"/>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h4>Tema visual</h4>
        <div class="theme-picker" id="theme-picker">
          <div class="theme-swatch" title="Cotton Candy" data-theme="cotton_candy" style="background:linear-gradient(135deg,#f8d7ea,#d4689a)" onclick="pickTheme(this)"></div>
          <div class="theme-swatch" title="Sóbrio" data-theme="sobrio" style="background:linear-gradient(135deg,#dbeafe,#1e40af)" onclick="pickTheme(this)"></div>
          <div class="theme-swatch" title="Cinza" data-theme="cinza" style="background:linear-gradient(135deg,#f3f4f6,#374151)" onclick="pickTheme(this)"></div>
          <div class="theme-swatch" title="Vibrante" data-theme="vibrante" style="background:linear-gradient(135deg,#ede9fe,#7c3aed)" onclick="pickTheme(this)"></div>
          <div class="theme-swatch" title="Dark" data-theme="dark" style="background:linear-gradient(135deg,#1e293b,#818cf8)" onclick="pickTheme(this)"></div>
          <div class="theme-swatch" title="Minimal" data-theme="minimal" style="background:linear-gradient(135deg,#ffffff,#000000)" onclick="pickTheme(this)"></div>
          <div class="theme-swatch" title="Personalizado" data-theme="custom" style="background:conic-gradient(#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)" onclick="pickTheme(this)"></div>
        </div>
        <div id="custom-theme-builder" style="display:none; margin-top:20px;">
          <p style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">Personalize as cores principais:</p>
          <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:12px;">
            <div class="form-field" style="margin:0"><label>Primária</label><input type="color" id="ct-primary" value="#7c3aed"/></div>
            <div class="form-field" style="margin:0"><label>Primária clara</label><input type="color" id="ct-primary-light" value="#ede9fe"/></div>
            <div class="form-field" style="margin:0"><label>Accent</label><input type="color" id="ct-accent" value="#db2777"/></div>
            <div class="form-field" style="margin:0"><label>Fundo</label><input type="color" id="ct-bg" value="#faf5ff"/></div>
            <div class="form-field" style="margin:0"><label>Superfície</label><input type="color" id="ct-surface" value="#ffffff"/></div>
            <div class="form-field" style="margin:0"><label>Texto</label><input type="color" id="ct-text" value="#1e1b4b"/></div>
          </div>
          <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="applyCustomTheme()">Aplicar tema personalizado</button>
        </div>
      </div>

      <div class="settings-section">
        <h4>Fonte</h4>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="form-field" style="margin:0">
            <label>Estilo</label>
            <select id="cfg-font-family">
              <option value="Inter">Inter (padrão)</option>
              <option value="Georgia">Georgia (serifada)</option>
              <option value="Roboto">Roboto</option>
              <option value="Mono">Monoespaçada</option>
            </select>
          </div>
          <div class="form-field" style="margin:0">
            <label>Tamanho</label>
            <select id="cfg-font-size">
              <option value="small">Pequeno</option>
              <option value="medium">Médio (padrão)</option>
              <option value="large">Grande</option>
            </select>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h4>Categorias <button class="btn btn-ghost btn-sm" style="font-size:11px" onclick="openAddCategory()">+ Nova</button></h4>
        <div class="cat-list" id="cat-list-settings"></div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Fechar</button>
      <button class="btn btn-primary" onclick="saveSettings()">Salvar configurações</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxa2S6oVyt2hTP1QjkpkJQH9AMApKSBI0zk_z4VZbIABvyfS45VkRWJuxLRpO6Dthgm/exec"; // ← Cole aqui a URL do seu Apps Script

const DAYS = {
  "pt-BR": ["(Sem dia)", "Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"],
  "en":    ["(No day)", "Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
  "es":    ["(Sin día)", "Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"],
  "fr":    ["(Sans jour)", "Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"],
  "de":    ["(Kein Tag)", "Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"],
};
const DAY_KEYS = ["", "Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const FONT_CLASS = {Inter:"font-inter", Georgia:"font-georgia", Roboto:"font-roboto", Mono:"font-mono"};
const FONTSIZE_CLASS = {small:"fontsize-small", medium:"fontsize-medium", large:"fontsize-large"};

// ============================================================
// STATE
// ============================================================
let state = {
  token: localStorage.getItem("agenda_token"),
  username: localStorage.getItem("agenda_username"),
  userId: localStorage.getItem("agenda_userId"),
  tasks: [],
  categories: [],
  config: {lang:"pt-BR", theme:"cotton_candy", font_family:"Inter", font_size:"medium"},
  weeks: [],
  currentWeek: null,
  currentWeekIndex: 0,
  view: "week",
  editingTaskId: null,
  listGroupBy: "categoria", // "categoria" | "dia"
  collapsedCats: new Set(), // ids de categorias colapsadas na visão semanal
  searchTerm: "",
  modalSubtasks: [], // subtarefas sendo editadas no modal (antes de salvar)
};

// ============================================================
// INIT
// ============================================================
async function init() {
  if (!state.token) { window.location.href = "index.html"; return; }
  document.getElementById("user-display").textContent = "👤 " + (state.username || "");
  await Promise.all([loadConfig(), loadCategories()]);
  await loadWeeks();
  render();
}

// ============================================================
// API
// ============================================================
async function api(payload) {
  const r = await fetch(BACKEND_URL, {
    method: "POST",
    body: JSON.stringify({...payload, token: state.token})
  });
  const data = await r.json();
  if (data.error === "unauthorized") { logout(); return; }
  return data;
}

// ── Trava genérica contra duplo clique / múltiplos envios ──
// Desabilita o botão, mostra um spinner + texto de carregamento,
// executa a ação assíncrona, e só então reabilita o botão.
// Se o botão já estiver em execução, um segundo clique é ignorado.
const _busyButtons = new WeakSet();
async function withLoading(btn, loadingText, action) {
  if (!btn || _busyButtons.has(btn)) return; // ignora cliques repetidos
  _busyButtons.add(btn);
  const originalHTML = btn.innerHTML;
  const originalWidth = btn.offsetWidth;
  btn.style.minWidth = originalWidth + "px"; // evita o botão "pular" de tamanho
  btn.disabled = true;
  btn.innerHTML = `<span class="btn-spinner"></span> ${loadingText}`;
  try {
    await action();
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalHTML;
    btn.style.minWidth = "";
    _busyButtons.delete(btn);
  }
}

// ============================================================
// DATA LOADERS
// ============================================================
async function loadConfig() {
  const r = await api({action:"getConfig"});
  if (r && r.ok) {
    state.config = r.config;
    applyThemeFromConfig();
  }
}

async function loadCategories() {
  const r = await api({action:"getCategories"});
  if (r && r.ok) state.categories = r.categories;
}

async function loadWeeks() {
  const r = await api({action:"getWeeks"});
  if (r && r.ok) {
    state.weeks = r.weeks;
    if (!state.currentWeek) {
      state.currentWeek = getCurrentWeekKey();
      state.currentWeekIndex = state.weeks.indexOf(state.currentWeek);
      if (state.currentWeekIndex === -1) { state.weeks.unshift(state.currentWeek); state.currentWeekIndex = 0; }
    }
  }
  await loadTasks();
}

async function loadTasks() {
  const r = await api({action:"getTasks", semana: state.currentWeek});
  if (r && r.ok) { state.tasks = r.tasks; state.currentWeek = r.semana; }
  updateWeekBar();
  render();
}

// ============================================================
// WEEK UTILS
// ============================================================
function getCurrentWeekKey() {
  const now = new Date();
  const mon = getMonday(now);
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  return fmtKey(mon)+"_"+fmtKey(sat);
}
function getMonday(d) {
  const date = new Date(d), day = date.getDay();
  date.setDate(date.getDate() + (day===0 ? -6 : 1-day));
  date.setHours(0,0,0,0); return date;
}
function fmtKey(d) { return `${String(d.getDate()).padStart(2,'0')}${String(d.getMonth()+1).padStart(2,'0')}${d.getFullYear()}`; }
function weekKeyToDisplay(key) {
  if (!key) return "";
  const [a,b] = key.split("_");
  return `${a.slice(0,2)}/${a.slice(2,4)} – ${b.slice(0,2)}/${b.slice(2,4)}/${b.slice(4)}`;
}

function updateWeekBar() {
  const currentKey = getCurrentWeekKey();
  const isCurrentWeek = state.currentWeek === currentKey;
  document.getElementById("week-label").textContent = weekKeyToDisplay(state.currentWeek);
  document.getElementById("week-tag").textContent = isCurrentWeek ? "semana atual" : state.currentWeek > currentKey ? "semana futura" : "semana passada";
  document.getElementById("today-btn").style.display = isCurrentWeek ? "none" : "";
}

function navWeek(dir) {
  const idx = state.weeks.indexOf(state.currentWeek) + dir;
  if (idx >= 0 && idx < state.weeks.length) {
    state.currentWeek = state.weeks[idx];
  } else if (dir > 0) {
    // Cria próxima semana
    const parts = state.currentWeek.split("_");
    const mon = new Date(parts[0].slice(4), parts[0].slice(2,4)-1, parts[0].slice(0,2));
    mon.setDate(mon.getDate()+7);
    const sat = new Date(mon); sat.setDate(mon.getDate()+5);
    state.currentWeek = fmtKey(mon)+"_"+fmtKey(sat);
    state.weeks.unshift(state.currentWeek);
  }
  loadTasks();
}

function goToCurrentWeek() {
  state.currentWeek = getCurrentWeekKey();
  if (!state.weeks.includes(state.currentWeek)) state.weeks.unshift(state.currentWeek);
  loadTasks();
}

// ============================================================
// VIEW TOGGLE
// ============================================================
function setView(v) {
  state.view = v;
  document.getElementById("btn-view-week").classList.toggle("active", v==="week");
  document.getElementById("btn-view-list").classList.toggle("active", v==="list");
  document.getElementById("list-group-toggle").style.display = v==="list" ? "" : "none";
  render();
}

function setListGroup(g) {
  state.listGroupBy = g;
  document.getElementById("btn-group-cat").classList.toggle("active", g==="categoria");
  document.getElementById("btn-group-day").classList.toggle("active", g==="dia");
  render();
}

function toggleCatCollapse(catId) {
  if (state.collapsedCats.has(catId)) state.collapsedCats.delete(catId);
  else state.collapsedCats.add(catId);
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const main = document.getElementById("main-content");
  if (state.view === "week") main.innerHTML = renderWeekView();
  else main.innerHTML = renderListView();
  updateWeekProgress();
}

function getCatById(id) { return state.categories.find(c=>c.id===id) || {nome:"—", cor_escura:"#64748b", cor_clara:"#f1f5f9"}; }
function getLang() { return state.config.lang || "pt-BR"; }
function getDays() { return DAYS[getLang()] || DAYS["pt-BR"]; }

function getTaskById(id) { return state.tasks.find(t=>t.id===id); }

function isTaskBlocked(t) {
  if (!t.depende_de) return false;
  const dep = getTaskById(t.depende_de);
  if (!dep) return false; // tarefa-pai não existe mais nesta lista — não bloqueia
  return !dep.concluida;
}

function matchesSearch(t) {
  if (!state.searchTerm) return true;
  return t.titulo.toLowerCase().includes(state.searchTerm.toLowerCase());
}

function getTodayDayKey() {
  const map = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return map[new Date().getDay()];
}

function isCurrentWeekActive() {
  return state.currentWeek === getCurrentWeekKey();
}

function updateWeekProgress() {
  const total = state.tasks.length;
  const done  = state.tasks.filter(t=>t.concluida).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  const fillEl = document.getElementById("week-progress-fill");
  const labelEl = document.getElementById("week-progress-label");
  if (fillEl)  fillEl.style.width = pct + "%";
  if (labelEl) labelEl.textContent = `${done}/${total}`;
}

function renderWeekView() {
  const days = getDays();
  const todayKey = getTodayDayKey();
  const showToday = isCurrentWeekActive();

  let html = '<div class="week-grid">';
  // Header
  html += `<div class="week-grid-header cat-col">${days[0]||"Categoria"}</div>`;
  for (let i=1;i<=7;i++) {
    const isToday = showToday && DAY_KEYS[i] === todayKey;
    html += `<div class="week-grid-header ${isToday?'is-today':''}">${days[i]}</div>`;
  }

  // Filtro de busca aplicado a todas as tarefas
  const visibleTasks = state.tasks.filter(matchesSearch);

  // Unscheduled tasks (sem dia)
  const unscheduled = visibleTasks.filter(t=>!t.dia);

  // Por categoria
  for (const cat of state.categories) {
    const catTasks = visibleTasks.filter(t=>t.categoria_id===cat.id && t.dia);
    const catUnscheduled = unscheduled.filter(t=>t.categoria_id===cat.id);
    if (catTasks.length === 0 && catUnscheduled.length === 0) continue;
    const total = catTasks.length + catUnscheduled.length;
    const done  = catTasks.filter(t=>t.concluida).length + catUnscheduled.filter(t=>t.concluida).length;
    const isCollapsed = state.collapsedCats.has(cat.id);

    // Linha de cabeçalho da categoria — clicável para colapsar/expandir
    html += `<div class="cat-header-row" style="background:${cat.cor_escura};color:#fff;grid-column:1/-1;cursor:pointer;" onclick="toggleCatCollapse('${cat.id}')">`;
    html += `<span class="cat-collapse-arrow" style="display:inline-block;transition:transform .15s;${isCollapsed?'transform:rotate(-90deg);':''}">▾</span> `;
    html += `${cat.nome} <span class="cat-count">${done}/${total}</span></div>`;

    if (isCollapsed) continue; // pula a linha de dias desta categoria

    // Linha de células por dia
    html += `<div class="week-cell cat-label" style="background:${cat.cor_escura}22;color:${cat.cor_escura}">${cat.nome}</div>`;
    for (let d=1; d<=7; d++) {
      const dayKey = DAY_KEYS[d];
      const isToday = showToday && dayKey === todayKey;
      const dayTasks = catTasks.filter(t=>t.dia===dayKey);
      html += `<div class="week-cell ${isToday?'is-today-col':''}" style="background:${cat.cor_clara}55" ondragover="event.preventDefault()" ondrop="dropTask(event,'${cat.id}','${dayKey}')">`;
      for (const t of dayTasks) {
        html += renderTaskChip(t, cat);
      }
      html += `<div class="add-task-inline"><button onclick="openAddTask('${cat.id}','${dayKey}')" title="Adicionar tarefa">＋</button></div>`;
      html += `</div>`;
    }
  }

  html += '</div>';

  // Tarefas sem dia agendado
  if (unscheduled.length > 0) {
    html += `<div class="unscheduled-col">`;
    html += `<div class="unscheduled-col-header">📌 ${getLang()==="pt-BR"?"Sem dia definido — clique para agendar":"Unscheduled — click to assign a day"} <span class="badge" style="background:var(--surface2);color:var(--text-muted)">${unscheduled.length}</span></div>`;
    html += `<div class="unscheduled-list">`;
    for (const t of unscheduled) {
      const cat = getCatById(t.categoria_id);
      html += renderTaskChip(t, cat, true);
    }
    html += `</div></div>`;
  }

  return html;
}

function priorityDot(t) {
  if (!t.prioridade) return "";
  return `<span class="priority-dot priority-${t.prioridade}" title="Prioridade ${t.prioridade}"></span>`;
}

function starIcon(t) {
  return `<span class="star-icon ${t.destaque?'active':''}" onclick="event.stopPropagation();toggleDestaque('${t.id}')" title="Destacar">${t.destaque?'⭐':'☆'}</span>`;
}

function renderSubtasksInline(t) {
  if (!t.subtarefas || t.subtarefas.length === 0) return "";
  let html = `<div class="subtask-list" onclick="event.stopPropagation()">`;
  t.subtarefas.forEach(st => {
    html += `<label class="subtask-row ${st.concluida?'done':''}">
      <input type="checkbox" ${st.concluida?"checked":""} onchange="toggleSubtaskInline('${st.id}','${t.id}')"/>
      <span>${escHtml(st.titulo)}</span>
    </label>`;
  });
  html += `</div>`;
  return html;
}

function renderTaskChip(t, cat, unscheduled=false) {
  const doneClass = t.concluida ? "done" : "";
  const unsClass  = unscheduled ? "unscheduled" : "";
  const blocked = isTaskBlocked(t);
  const blockedAttrs = blocked ? `draggable="false"` : `draggable="true" ondragstart="dragTask(event,'${t.id}')"`;
  return `<div class="task-chip ${doneClass} ${unsClass} ${blocked?'blocked':''}" ${blockedAttrs}
    style="border-left-color:${cat.cor_escura}"
    onclick="openEditTask('${t.id}')">
    <div class="task-check" onclick="event.stopPropagation()">
      <label class="check-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" ${t.concluida?"checked":""} ${blocked?"disabled":""} onclick="event.stopPropagation()" onchange="toggleTask('${t.id}')"/>
        <div class="check-box"></div>
      </label>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:4px;">
        ${priorityDot(t)}
        <span class="task-title" style="flex:1">${escHtml(t.titulo)}</span>
        ${blocked?'<span class="dep-lock-icon" title="Bloqueada até a tarefa da qual depende ser concluída">🔒</span>':''}
        ${starIcon(t)}
      </div>
      ${renderSubtasksInline(t)}
    </div>
  </div>`;
}

function renderListView() {
  let html = '<div class="list-view">';
  const days = getDays();
  const visibleTasks = state.tasks.filter(matchesSearch);

  if (state.categories.length === 0 || visibleTasks.length === 0) {
    const msg = state.searchTerm
      ? `Nenhuma tarefa encontrada para "${escHtml(state.searchTerm)}".`
      : `Nenhuma tarefa esta semana. Clique em <strong>+ Tarefa</strong> para começar.`;
    html += `<div class="empty-state"><div class="empty-icon">📭</div><p>${msg}</p></div>`;
    return html + '</div>';
  }

  if (state.listGroupBy === "dia") {
    // Agrupado por dia da semana (Segunda a Domingo, depois "Sem dia")
    for (let d = 1; d <= 8; d++) {
      const dayKey = d === 8 ? "" : DAY_KEYS[d];
      const dayLabel = d === 8 ? days[0] : days[d];
      const dayTasks = visibleTasks.filter(t => (t.dia || "") === dayKey);
      if (dayTasks.length === 0) continue;
      const done = dayTasks.filter(t=>t.concluida).length;
      const isToday = isCurrentWeekActive() && dayKey === getTodayDayKey();

      html += `<div class="list-cat-block">`;
      html += `<div class="list-cat-header" style="background:${isToday?'var(--primary)':'var(--text)'};color:var(--surface)">`;
      html += `<div><div class="list-cat-name">${dayLabel}${isToday?' • hoje':''}</div><div class="list-cat-sub">${done}/${dayTasks.length} concluídas</div></div>`;
      html += `</div><div class="list-tasks">`;
      for (const t of dayTasks) {
        const cat = getCatById(t.categoria_id);
        html += renderListTaskRow(t, cat, true); // mostra o nome da categoria em vez do dia
      }
      html += `</div></div>`;
    }
    return html + '</div>';
  }

  // Agrupado por categoria (padrão)
  for (const cat of state.categories) {
    const catTasks = visibleTasks.filter(t=>t.categoria_id===cat.id);
    if (catTasks.length === 0) continue;
    const done = catTasks.filter(t=>t.concluida).length;
    html += `<div class="list-cat-block">`;
    html += `<div class="list-cat-header" style="background:${cat.cor_escura};color:#fff">`;
    html += `<div><div class="list-cat-name">${cat.nome}</div><div class="list-cat-sub">${done}/${catTasks.length} concluídas</div></div>`;
    html += `</div>`;
    html += `<div class="list-tasks">`;
    for (const t of catTasks) {
      html += renderListTaskRow(t, cat, false); // mostra o dia em vez da categoria
    }
    html += `</div></div>`;
  }
  return html + '</div>';
}

function renderListTaskRow(t, cat, showCategory) {
  const days = getDays();
  const dayLabel = t.dia ? days[DAY_KEYS.indexOf(t.dia)] : days[0];
  const dayClass = t.dia ? "" : "no-day";
  const tagLabel = showCategory ? cat.nome : dayLabel;
  const tagStyle = showCategory
    ? `color:${cat.cor_escura};background:${cat.cor_clara}`
    : "";
  const blocked = isTaskBlocked(t);
  let html = `<div class="list-task-row ${t.concluida?"done":""} ${blocked?"blocked":""}" onclick="openEditTask('${t.id}')">`;
  html += `<label class="check-wrap" onclick="event.stopPropagation()">
    <input type="checkbox" ${t.concluida?"checked":""} ${blocked?"disabled":""} onchange="toggleTask('${t.id}')"/>
    <div class="check-box" style="border-color:${cat.cor_escura}"></div>
  </label>`;
  html += `<div style="flex:1;min-width:0;">`;
  html += `<div style="display:flex;align-items:center;gap:5px;">`;
  html += priorityDot(t);
  html += `<span class="list-task-title" id="ltt-${t.id}"
      ondblclick="event.stopPropagation();startInlineEdit('${t.id}', this)"
      title="Duplo clique para editar rapidamente">${escHtml(t.titulo)}</span>`;
  if (blocked) html += `<span class="dep-lock-icon" title="Bloqueada até a tarefa da qual depende ser concluída">🔒</span>`;
  html += `</div>`;
  html += renderSubtasksInline(t);
  html += `</div>`;
  html += `<span class="list-task-day ${showCategory?"":dayClass}" style="${tagStyle}">${tagLabel}</span>`;
  html += starIcon(t);
  html += `<div class="list-task-actions">
    <button onclick="event.stopPropagation();openEditTask('${t.id}')" title="Editar">✏️</button>
    <button onclick="event.stopPropagation();deleteTask('${t.id}')" title="Excluir">🗑</button>
  </div>`;
  html += `</div>`;
  return html;
}

// ============================================================
// TASK ACTIONS
// ============================================================
function openAddTask(catId="", dayKey="") {
  state.editingTaskId = null;
  state.modalSubtasks = [];
  document.getElementById("modal-task-title").textContent = "Nova Tarefa";
  document.getElementById("btn-save-task").textContent = "Salvar tarefa";
  document.getElementById("task-title").value = "";
  document.getElementById("task-detail").value = "";
  document.getElementById("task-priority").value = "";
  document.getElementById("task-destaque").checked = false;
  populateCatSelect(catId);
  populateDaySelect(dayKey);
  document.getElementById("task-week").value = "current";
  document.getElementById("field-week-choice").style.display = "";
  document.getElementById("field-subtasks").style.display = "none"; // só após criar a tarefa
  resetRecurrenceFields();
  populateDependsSelect("");
  document.getElementById("modal-task").style.display = "flex";
  setTimeout(()=>document.getElementById("task-title").focus(), 100);
}

function openEditTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (!t) return;
  state.editingTaskId = id;
  state.modalSubtasks = (t.subtarefas || []).map(s=>({...s}));
  document.getElementById("modal-task-title").textContent = "Editar Tarefa";
  document.getElementById("btn-save-task").textContent = "Salvar alterações";
  document.getElementById("task-title").value = t.titulo;
  document.getElementById("task-detail").value = t.detalhe || "";
  document.getElementById("task-priority").value = t.prioridade || "";
  document.getElementById("task-destaque").checked = !!t.destaque;
  populateCatSelect(t.categoria_id);
  populateDaySelect(t.dia || "");
  document.getElementById("field-week-choice").style.display = "none";
  document.getElementById("field-subtasks").style.display = "";
  renderSubtaskListModal();

  // Recorrência
  resetRecurrenceFields();
  if (t.recorrencia) {
    try {
      const rec = JSON.parse(t.recorrencia);
      document.getElementById("task-recurrent-toggle").checked = true;
      toggleRecurrenceFields();
      (rec.dias || []).forEach(d => {
        const cb = document.querySelector(`#recurrence-days input[value="${d}"]`);
        if (cb) cb.checked = true;
      });
      document.getElementById("recurrence-end").value = rec.fim || "";
    } catch(e) {}
  }

  populateDependsSelect(t.depende_de || "", t.id);
  document.getElementById("modal-task").style.display = "flex";
  setTimeout(()=>document.getElementById("task-title").focus(), 100);
}

function populateCatSelect(selectedId="") {
  const sel = document.getElementById("task-cat");
  sel.innerHTML = state.categories.map(c=>
    `<option value="${c.id}" ${c.id===selectedId?"selected":""}>${c.nome}</option>`
  ).join("");
}

function populateDaySelect(selectedKey="") {
  const days = getDays();
  const sel = document.getElementById("task-day");
  sel.innerHTML = days.map((d,i)=>
    `<option value="${DAY_KEYS[i]}" ${DAY_KEYS[i]===selectedKey?"selected":""}>${d}</option>`
  ).join("");
}

function populateDependsSelect(selectedId="", excludeId="") {
  const sel = document.getElementById("task-depends");
  const days = getDays();
  const lang0 = days[0];
  // Apenas tarefas da MESMA semana, excluindo a própria tarefa (caso edição)
  const options = state.tasks
    .filter(t => t.id !== excludeId)
    .map(t => {
      const dayLabel = t.dia ? days[DAY_KEYS.indexOf(t.dia)] : lang0;
      return `<option value="${t.id}" ${t.id===selectedId?"selected":""}>${escHtml(t.titulo)} (${dayLabel})</option>`;
    }).join("");
  sel.innerHTML = `<option value="">Nenhuma dependência</option>` + options;
}

function resetRecurrenceFields() {
  document.getElementById("task-recurrent-toggle").checked = false;
  document.getElementById("recurrence-fields").style.display = "none";
  document.getElementById("recurrence-end").value = "";
  const days = getDays();
  const container = document.getElementById("recurrence-days");
  container.innerHTML = DAY_KEYS.slice(1).map((dk,i) => `
    <label style="display:flex;align-items:center;gap:4px;font-size:12px;background:var(--surface);padding:5px 9px;border-radius:99px;border:1px solid var(--border);cursor:pointer;">
      <input type="checkbox" value="${dk}" style="margin:0;"/> ${days[i+1].slice(0,3)}
    </label>`).join("");
}

function toggleRecurrenceFields() {
  const checked = document.getElementById("task-recurrent-toggle").checked;
  document.getElementById("recurrence-fields").style.display = checked ? "" : "none";
}

// ── Subtarefas dentro do modal ──
function renderSubtaskListModal() {
  const container = document.getElementById("subtask-list-modal");
  if (state.modalSubtasks.length === 0) {
    container.innerHTML = `<p style="font-size:12px;color:var(--text-muted)">Nenhuma subtarefa ainda.</p>`;
    return;
  }
  container.innerHTML = state.modalSubtasks.map(st => `
    <div style="display:flex;align-items:center;gap:8px;">
      <label class="check-wrap" style="flex:1">
        <input type="checkbox" ${st.concluida?"checked":""} onchange="toggleModalSubtask('${st.id}')"/>
        <div class="check-box"></div>
        <span style="font-size:13px;${st.concluida?'text-decoration:line-through;opacity:.6;':''}">${escHtml(st.titulo)}</span>
      </label>
      <button class="btn btn-ghost btn-sm" style="padding:2px 6px" onclick="removeModalSubtask('${st.id}')">✕</button>
    </div>`).join("");
}

function addSubtaskToModal() {
  const input = document.getElementById("new-subtask-input");
  const titulo = input.value.trim();
  if (!titulo) return;
  // Subtarefa nova ainda sem id real — usamos id temporário prefixado
  state.modalSubtasks.push({id: "tmp_"+Date.now(), titulo, concluida: false, _new: true});
  input.value = "";
  renderSubtaskListModal();
}

function toggleModalSubtask(id) {
  const st = state.modalSubtasks.find(s=>s.id===id);
  if (!st) return;
  st.concluida = !st.concluida;
  if (!st._new) api({action:"toggleSubtask", id, concluida: st.concluida});
  renderSubtaskListModal();
}

function removeModalSubtask(id) {
  const st = state.modalSubtasks.find(s=>s.id===id);
  state.modalSubtasks = state.modalSubtasks.filter(s=>s.id!==id);
  if (st && !st._new) api({action:"deleteSubtask", id});
  renderSubtaskListModal();
}

function closeTaskModal(e) {
  if (!e || e.target === document.getElementById("modal-task"))
    document.getElementById("modal-task").style.display = "none";
}

async function saveTask() {
  const title = document.getElementById("task-title").value.trim();
  if (!title) { toast("⚠️ Informe o título da tarefa."); return; }

  const btn = document.getElementById("btn-save-task");
  const isEditing = !!state.editingTaskId;

  await withLoading(btn, isEditing ? "Salvando…" : "Adicionando…", async () => {
    const catId    = document.getElementById("task-cat").value;
    const dayKey   = document.getElementById("task-day").value;
    const detail   = document.getElementById("task-detail").value.trim();
    const weekPref = document.getElementById("task-week").value;
    const priority = document.getElementById("task-priority").value;
    const destaque = document.getElementById("task-destaque").checked;
    const dependeDe= document.getElementById("task-depends").value;

    // Recorrência
    let recorrencia = "";
    if (document.getElementById("task-recurrent-toggle").checked) {
      const dias = Array.from(document.querySelectorAll("#recurrence-days input:checked")).map(cb=>cb.value);
      if (dias.length > 0) {
        const fim = document.getElementById("recurrence-end").value || "";
        recorrencia = JSON.stringify({dias, fim});
      }
    }

    let semana = state.currentWeek;
    if (!isEditing && weekPref === "next") {
      const parts = state.currentWeek.split("_");
      const mon = new Date(parts[0].slice(4), parts[0].slice(2,4)-1, parts[0].slice(0,2));
      mon.setDate(mon.getDate()+7);
      const sat = new Date(mon); sat.setDate(mon.getDate()+5);
      semana = fmtKey(mon)+"_"+fmtKey(sat);
    }

    if (isEditing) {
      await api({
        action:"updateTask", id:state.editingTaskId, titulo:title, categoria_id:catId,
        dia:dayKey, detalhe:detail, prioridade:priority, destaque, recorrencia, depende_de: dependeDe
      });
      toast("✅ Tarefa atualizada!");
    } else {
      const res = await api({
        action:"addTask", semana, titulo:title, categoria_id:catId, dia:dayKey,
        detalhe:detail, prioridade:priority, destaque, recorrencia, depende_de: dependeDe
      });
      // Salva subtarefas adicionadas antes mesmo de a tarefa existir
      if (res && res.ok && state.modalSubtasks.length > 0) {
        for (const st of state.modalSubtasks) {
          await api({action:"addSubtask", tarefa_id: res.id, titulo: st.titulo});
        }
      }
      toast("✅ Tarefa adicionada!");
    }

    closeTaskModal();
    await loadWeeks();
  });
}

async function toggleTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (!t) return;
  if (isTaskBlocked(t)) {
    toast("🔒 Esta tarefa depende de outra que ainda não foi concluída.");
    render(); // reverte o checkbox visualmente
    return;
  }
  const novoEstado = !t.concluida;
  t.concluida = novoEstado;
  render();
  const r = await api({action:"updateTask", id, concluida:novoEstado});
  if (r && !r.ok && r.error === "blocked_by_dependency") {
    t.concluida = !novoEstado; // reverte
    toast("🔒 Esta tarefa depende de outra que ainda não foi concluída.");
    render();
  } else if (novoEstado && t.recorrencia) {
    // Pode ter gerado uma nova ocorrência na próxima semana — recarrega lista de semanas
    await loadWeeks();
  }
}

async function toggleDestaque(id) {
  const t = state.tasks.find(t=>t.id===id);
  if (!t) return;
  t.destaque = !t.destaque;
  render();
  await api({action:"updateTask", id, destaque:t.destaque});
}

async function toggleSubtaskInline(subId, taskId) {
  const t = state.tasks.find(t=>t.id===taskId);
  const st = t && t.subtarefas.find(s=>s.id===subId);
  if (!st) return;
  st.concluida = !st.concluida;
  render();
  await api({action:"toggleSubtask", id: subId, concluida: st.concluida});
}

// ── Edição rápida inline (duplo clique no título, na visão Lista) ──
function startInlineEdit(taskId, el) {
  const t = getTaskById(taskId);
  if (!t || isTaskBlocked(t)) return;
  el.contentEditable = "true";
  el.focus();
  document.execCommand("selectAll", false, null);

  const finish = async (save) => {
    el.contentEditable = "false";
    el.removeEventListener("blur", onBlur);
    el.removeEventListener("keydown", onKeydown);
    const newTitle = el.textContent.trim();
    if (save && newTitle && newTitle !== t.titulo) {
      t.titulo = newTitle;
      await api({action:"updateTask", id: taskId, titulo: newTitle});
      toast("✅ Tarefa atualizada!");
    } else {
      el.textContent = t.titulo; // reverte se vazio ou cancelado
    }
  };
  const onBlur = () => finish(true);
  const onKeydown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); el.blur(); }
    if (e.key === "Escape") { e.preventDefault(); finish(false); }
  };
  el.addEventListener("blur", onBlur);
  el.addEventListener("keydown", onKeydown);
}

// ── Busca rápida ──
let _searchDebounce;
function onSearchInput() {
  clearTimeout(_searchDebounce);
  const val = document.getElementById("search-input").value;
  document.getElementById("search-clear").style.display = val ? "" : "none";
  _searchDebounce = setTimeout(() => {
    state.searchTerm = val.trim();
    render();
  }, 150);
}
function clearSearch() {
  document.getElementById("search-input").value = "";
  document.getElementById("search-clear").style.display = "none";
  state.searchTerm = "";
  render();
}

// ── Exportar CSV ──
async function exportCSV() {
  const btn = document.querySelector('[onclick="exportCSV()"]');
  await withLoading(btn, "Exportando…", async () => {
    const r = await api({action:"exportCSV"});
    if (!r || !r.ok) { toast("⚠️ Erro ao exportar."); return; }
    const blob = new Blob(["\uFEFF" + r.csv], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `agenda-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("⬇️ CSV exportado!");
  });
}

async function deleteTask(id) {
  if (!confirm("Excluir esta tarefa?")) return;
  await api({action:"deleteTask", id});
  await loadTasks();
  toast("🗑 Tarefa excluída.");
}

// Drag & drop
let draggedId = null;
function dragTask(e, id) { draggedId = id; e.dataTransfer.effectAllowed="move"; }
async function dropTask(e, catId, dayKey) {
  if (!draggedId) return;
  const t = getTaskById(draggedId);
  if (t && isTaskBlocked(t)) {
    toast("🔒 Esta tarefa depende de outra que ainda não foi concluída.");
    draggedId = null;
    return;
  }
  const r = await api({action:"updateTask", id:draggedId, categoria_id:catId, dia:dayKey});
  draggedId = null;
  if (r && !r.ok && r.error === "blocked_by_dependency") {
    toast("🔒 Esta tarefa depende de outra que ainda não foi concluída.");
  }
  await loadTasks();
}

// ============================================================
// SETTINGS
// ============================================================
async function openSettings() {
  await loadCategories();
  const c = state.config;
  document.getElementById("cfg-lang").value      = c.lang || "pt-BR";
  document.getElementById("cfg-email").value     = c.email || "";
  document.getElementById("cfg-send-day").value  = c.send_day || "Monday";
  document.getElementById("cfg-send-hour").value = c.send_hour ?? 8;
  document.getElementById("cfg-font-family").value = c.font_family || "Inter";
  document.getElementById("cfg-font-size").value   = c.font_size || "medium";

  // Tema
  document.querySelectorAll(".theme-swatch").forEach(s=>{
    s.classList.toggle("active", s.dataset.theme === (c.theme||"cotton_candy"));
  });
  document.getElementById("custom-theme-builder").style.display = c.theme==="custom" ? "" : "none";

  renderCatSettings();
  document.getElementById("modal-settings").style.display = "flex";
}

function closeSettings(e) {
  if (!e || e.target === document.getElementById("modal-settings"))
    document.getElementById("modal-settings").style.display = "none";
}

function renderCatSettings() {
  const list = document.getElementById("cat-list-settings");
  list.innerHTML = state.categories.map(c=>`
    <div class="cat-item" id="ci-${c.id}">
      <div class="cat-dot" style="background:${c.cor_escura}"></div>
      <span class="cat-item-name">${escHtml(c.nome)}</span>
      <div class="cat-item-actions">
        <button onclick="editCategoryInline('${c.id}')" title="Editar">✏️</button>
        <button onclick="deleteCategoryItem('${c.id}')" title="Excluir">🗑</button>
      </div>
    </div>`).join("");
}

function editCategoryInline(id) {
  const cat = state.categories.find(c=>c.id===id);
  if (!cat) return;
  const el = document.getElementById("ci-"+id);
  el.innerHTML = `
    <input value="${escHtml(cat.nome)}" id="ei-name-${id}" style="flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:14px;"/>
    <div class="color-grid">
      <input type="color" value="${cat.cor_escura}" id="ei-dark-${id}"/>
      <input type="color" value="${cat.cor_clara}" id="ei-light-${id}"/>
    </div>
    <button class="btn btn-primary btn-sm" onclick="saveCategoryInline('${id}')">OK</button>
    <button class="btn btn-ghost btn-sm" onclick="renderCatSettings()">✕</button>`;
}

function saveCategoryInline(id) {
  const cat = state.categories.find(c=>c.id===id);
  if (!cat) return;
  cat.nome       = document.getElementById("ei-name-"+id).value.trim();
  cat.cor_escura = document.getElementById("ei-dark-"+id).value;
  cat.cor_clara  = document.getElementById("ei-light-"+id).value;
  renderCatSettings();
}

function openAddCategory() {
  const nome = prompt("Nome da nova categoria:");
  if (!nome) return;
  state.categories.push({
    id: "cat_new_"+Date.now(), nome: nome.trim(),
    cor_escura:"#64748b", cor_clara:"#f1f5f9", ordem: state.categories.length
  });
  renderCatSettings();
}

function deleteCategoryItem(id) {
  if (!confirm("Excluir esta categoria? As tarefas associadas não serão apagadas.")) return;
  state.categories = state.categories.filter(c=>c.id!==id);
  renderCatSettings();
}

function pickTheme(el) {
  document.querySelectorAll(".theme-swatch").forEach(s=>s.classList.remove("active"));
  el.classList.add("active");
  state.config.theme = el.dataset.theme;
  document.getElementById("custom-theme-builder").style.display = el.dataset.theme==="custom" ? "" : "none";
  if (el.dataset.theme !== "custom") applyThemeFromConfig();
}

function applyThemeFromConfig() {
  const map = {cotton_candy:"cotton-candy", sobrio:"sobrio", cinza:"cinza", vibrante:"vibrante", dark:"dark", minimal:"minimal"};
  const cls = "theme-" + (map[state.config.theme] || "cotton-candy");
  const fontCls = FONT_CLASS[state.config.font_family] || "font-inter";
  const sizeCls = FONTSIZE_CLASS[state.config.font_size] || "fontsize-medium";
  document.body.className = document.body.className
    .replace(/theme-\S+/g,"").replace(/font-\S+/g,"").replace(/fontsize-\S+/g,"")
    .trim() + ` ${cls} ${fontCls} ${sizeCls}`;
  if (state.config.theme === "custom" && state.config.custom_theme) applyCustomThemeDirect(state.config.custom_theme);
}

function applyCustomTheme() {
  const ct = {
    primary:       document.getElementById("ct-primary").value,
    primaryLight:  document.getElementById("ct-primary-light").value,
    accent:        document.getElementById("ct-accent").value,
    bg:            document.getElementById("ct-bg").value,
    surface:       document.getElementById("ct-surface").value,
    text:          document.getElementById("ct-text").value,
  };
  state.config.custom_theme = ct;
  applyCustomThemeDirect(ct);
  toast("🎨 Tema personalizado aplicado!");
}

function applyCustomThemeDirect(ct) {
  const r = document.documentElement;
  r.style.setProperty("--primary",       ct.primary);
  r.style.setProperty("--primary-light", ct.primaryLight);
  r.style.setProperty("--accent",        ct.accent);
  r.style.setProperty("--bg",            ct.bg);
  r.style.setProperty("--surface",       ct.surface);
  r.style.setProperty("--text",          ct.text);
}

async function saveSettings() {
  const btn = document.querySelector("#modal-settings .btn-primary");
  await withLoading(btn, "Salvando…", async () => {
    state.config.lang       = document.getElementById("cfg-lang").value;
    state.config.email      = document.getElementById("cfg-email").value;
    state.config.send_day   = document.getElementById("cfg-send-day").value;
    state.config.send_hour  = parseInt(document.getElementById("cfg-send-hour").value);
    state.config.font_family= document.getElementById("cfg-font-family").value;
    state.config.font_size  = document.getElementById("cfg-font-size").value;
    await Promise.all([
      api({action:"saveConfig", config: state.config}),
      api({action:"saveCategories", categories: state.categories})
    ]);
    applyThemeFromConfig();
    closeSettings();
    await loadCategories();
    render();
    toast("✅ Configurações salvas!");
  });
}

// ============================================================
// EMAIL
// ============================================================
async function sendEmail() {
  const btn = document.querySelector("[onclick=\"sendEmail()\"]");
  await withLoading(btn, "Enviando…", async () => {
    const r = await api({action:"sendEmail"});
    if (r && r.ok) toast("📧 E-mail enviado com sucesso!");
    else toast("⚠️ " + (r?.error || "Erro ao enviar e-mail. Verifique o e-mail nas configurações."));
  });
}

// ============================================================
// UTILS
// ============================================================
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  let el = document.getElementById("toast-el");
  if (!el) { el = document.createElement("div"); el.id="toast-el"; el.className="toast"; document.body.appendChild(el); }
  el.textContent = msg; el.style.display = "block";
  toastTimer = setTimeout(()=>{ el.style.display="none"; }, 3000);
}

// ============================================================
// BOOT
// ============================================================
init();
</script>
