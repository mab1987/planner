<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
    }
    .auth-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .auth-logo {
      font-size: 40px;
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 4px;
    }
    .auth-sub {
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 32px;
    }
    .auth-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .auth-tab.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      box-sizing: border-box;
      transition: border-color .2s;
      outline: none;
    }
    .field input:focus { border-color: var(--primary); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .auth-error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error.show { display: block; }
  </style>
</head>
<body class="theme-cotton-candy">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🗓️</div>
      <h1 class="auth-title">Agenda Semanal</h1>
      <p class="auth-sub">Organize sua semana com clareza</p>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="setTab('login')">Entrar</button>
        <button class="auth-tab" onclick="setTab('register')">Criar conta</button>
      </div>

      <div id="error-msg" class="auth-error"></div>

      <div id="tab-login">
        <div class="field">
          <label>Usuário</label>
          <input type="text" id="login-user" placeholder="seu usuário" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
      </div>

      <div id="tab-register" style="display:none">
        <div class="field">
          <label>Usuário</label>
          <input type="text" id="reg-user" placeholder="escolha um usuário" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Senha <span style="color:var(--text-muted);font-weight:400">(mín. 6 caracteres)</span></label>
          <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <div class="field">
          <label>Confirmar senha</label>
          <input type="password" id="reg-pass2" placeholder="••••••••" autocomplete="new-password"/>
        </div>
        <button class="btn-primary" id="btn-register" onclick="doRegister()">Criar conta</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = ""; // ← Cole aqui a URL do seu Apps Script (Web App URL)

    const ERRORS = {
      missing_fields:      "Preencha todos os campos.",
      invalid_credentials: "Usuário ou senha incorretos.",
      username_taken:      "Este usuário já está em uso.",
      password_too_short:  "A senha deve ter ao menos 6 caracteres.",
      passwords_no_match:  "As senhas não coincidem.",
      network:             "Erro de conexão. Tente novamente.",
    };

    function setTab(tab) {
      document.getElementById("tab-login").style.display    = tab === "login"    ? "" : "none";
      document.getElementById("tab-register").style.display = tab === "register" ? "" : "none";
      document.querySelectorAll(".auth-tab").forEach((el, i) => {
        el.classList.toggle("active", (tab === "login" && i === 0) || (tab === "register" && i === 1));
      });
      hideError();
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.classList.add("show");
    }
    function hideError() { document.getElementById("error-msg").classList.remove("show"); }

    async function callAPI(payload) {
      const r = await fetch(BACKEND_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      });
      return r.json();
    }

    async function doLogin() {
      hideError();
      const btn = document.getElementById("btn-login");
      btn.disabled = true; btn.textContent = "Entrando…";
      try {
        const res = await callAPI({
          action: "login",
          username: document.getElementById("login-user").value,
          password: document.getElementById("login-pass").value
        });
        if (res.ok) {
          localStorage.setItem("agenda_token",    res.token);
          localStorage.setItem("agenda_username", res.username);
          localStorage.setItem("agenda_userId",   res.userId);
          window.location.href = "app.html";
        } else {
          showError(ERRORS[res.error] || res.error);
        }
      } catch(e) { showError(ERRORS.network); }
      btn.disabled = false; btn.textContent = "Entrar";
    }

    async function doRegister() {
      hideError();
      const pass  = document.getElementById("reg-pass").value;
      const pass2 = document.getElementById("reg-pass2").value;
      if (pass !== pass2) { showError(ERRORS.passwords_no_match); return; }
      const btn = document.getElementById("btn-register");
      btn.disabled = true; btn.textContent = "Criando…";
      try {
        const res = await callAPI({
          action: "register",
          username: document.getElementById("reg-user").value,
          password: pass
        });
        if (res.ok) {
          localStorage.setItem("agenda_token",    res.token);
          localStorage.setItem("agenda_username", res.username);
          localStorage.setItem("agenda_userId",   res.userId);
          window.location.href = "app.html";
        } else {
          showError(ERRORS[res.error] || res.error);
        }
      } catch(e) { showError(ERRORS.network); }
      btn.disabled = false; btn.textContent = "Criar conta";
    }

    // Redireciona se já logado
    if (localStorage.getItem("agenda_token") && localStorage.getItem("agenda_username")) {
      window.location.href = "app.html";
    }

    // Enter para submeter
    document.addEventListener("keydown", e => {
      if (e.key !== "Enter") return;
      const isLogin = document.getElementById("tab-register").style.display === "none";
      if (isLogin) doLogin(); else doRegister();
    });
  </script>
</body>
</html>
